<!DOCTYPE html>
<html lang="en" class="page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04040e">
  <title>Your Node — Midnight Eclipse</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Node identity card ─────────────────────────────────────────── */
    .node-hero {
      text-align: center;
      padding: 36px 24px 28px;
      position: relative;
    }
    .node-constellation-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      border: 1px solid var(--c-color, var(--border-bright));
      color: var(--c-color, var(--accent));
      margin-bottom: 18px;
      background: rgba(108,142,245,0.07);
    }
    .node-name {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .node-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 22px;
    }
    .node-attrs {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 10px;
    }
    .node-attr { text-align: center; }
    .node-attr-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: block;
      margin-bottom: 3px;
    }
    .node-attr-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--c-color, var(--accent));
    }
    .polaris-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.5);
      color: var(--gold);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      margin-top: 10px;
    }
    .polaris-pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: live-pulse 1.4s ease-in-out infinite;
    }

    /* ── Info rows ──────────────────────────────────────────────────── */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .info-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .info-cell-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .info-cell-value { font-size: 13px; font-weight: 500; }

    /* ── Connection chips ───────────────────────────────────────────── */
    .connections-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .conn-chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .conn-chip:hover { border-color: var(--border-bright); background: var(--surface-2); }
    .conn-chip.is-neighbor { border-color: var(--accent); color: var(--text); }
    .conn-chip.is-polaris  { border-color: rgba(255,215,0,0.5); color: var(--gold); }
    .conn-chip .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── Tap prompt ─────────────────────────────────────────────────── */
    .tap-prompt {
      text-align: center;
      padding: 20px;
      background: var(--surface);
      border: 1px dashed var(--border-bright);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .tap-prompt-icon { font-size: 28px; margin-bottom: 8px; }
    .tap-prompt-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .tap-prompt-text strong { color: var(--text); }

    /* ── Comparison popup ───────────────────────────────────────────── */
    .compare-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(4,4,14,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-end;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .compare-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .compare-sheet {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      background: var(--surface);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      border-top: 1px solid var(--border-bright);
      padding: 8px 20px 40px;
      max-height: 90svh;
      overflow-y: auto;
      transform: translateY(40px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .compare-overlay.visible .compare-sheet {
      transform: translateY(0);
    }
    .sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--border-bright);
      margin: 10px auto 18px;
    }
    .compare-header { text-align: center; margin-bottom: 20px; }
    .compare-strength-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .compare-strength-badge.legendary { background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid rgba(255,215,0,0.5); }
    .compare-strength-badge.rare      { background:rgba(155,108,247,0.15);color:#c084fc;border:1px solid rgba(155,108,247,0.4); }
    .compare-strength-badge.upgrade   { background:rgba(108,142,245,0.15);color:var(--accent);border:1px solid var(--border-bright); }
    .compare-strength-badge.mid       { background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.3); }
    .compare-strength-badge.low       { background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border); }

    .compare-headline {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .compare-names {
      font-size: 13px;
      color: var(--text-muted);
    }

    .compare-person {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }
    .compare-person-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .compare-person-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-3);
      color: var(--accent);
      margin-bottom: 10px;
    }
    .compare-person-stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .cps { }
    .cps-label { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.1em; }
    .cps-val   { font-size: 13px; font-weight: 500; }

    .compare-polaris-note {
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--gold);
      margin-bottom: 14px;
      display: none;
    }
    .compare-polaris-note.visible { display: block; }

    .rule-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .rule-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: flex-start;
    }
    .rule-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .rule-dot.legendary { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
    .rule-dot.rare      { background: #c084fc;      box-shadow: 0 0 6px #c084fc; }
    .rule-dot.upgrade   { background: var(--accent); }
    .rule-dot.mid       { background: #fb923c; }
    .rule-dot.low       { background: var(--text-muted); }
    .rule-label { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .rule-text  { font-size: 12px; color: var(--text-muted); line-height: 1.45; }

    .compare-close {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--surface-3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body class="page">
  <div class="stars" id="stars"></div>

  <main class="page-container" id="main-content">
    <div id="loading" style="text-align:center;padding:60px 0;color:var(--text-muted)">
      <div style="font-family:var(--font-mono);letter-spacing:0.2em;font-size:12px">LOADING NODE...</div>
    </div>
  </main>

  <!-- Comparison popup (bottom sheet) -->
  <div class="compare-overlay" id="compare-overlay">
    <div class="compare-sheet" id="compare-sheet">
      <div class="sheet-handle"></div>
      <div id="compare-body"></div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/rules.js"></script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script>
  (async function () {
    // ── Data loading ──────────────────────────────────────────────────
    const [cards, consts, connections] = await Promise.all([
      fetch('data/cards.json').then(r => r.json()),
      fetch('data/constellations.json').then(r => r.json()),
      fetch('data/connections.json').then(r => r.json()),
    ]);

    const byId = {};
    cards.forEach(c => byId[c.id] = c);

    const url  = new URL(window.location.href);
    const idParam = url.searchParams.get('id') || url.searchParams.get('card');

    // Determine: am I viewing MY card, or is this a comparison scan?
    let myId = (() => { try { return localStorage.getItem('me_card_id'); } catch { return null; } })();

    if (idParam && !myId) {
      // First tap — store as identity
      myId = idParam;
      try { localStorage.setItem('me_card_id', myId); } catch(e) {}
    }

    const targetId = idParam || myId;
    if (!targetId) {
      document.getElementById('main-content').innerHTML =
        `<div class="section" style="text-align:center">
           <p>No card found. <a href="card.html">Go tap your card →</a></p>
         </div>`;
      return;
    }

    const card = byId[targetId];
    if (!card) {
      document.getElementById('main-content').innerHTML =
        `<div class="section" style="text-align:center">
           <p>Card not found. <a href="card.html">Try again →</a></p>
         </div>`;
      return;
    }

    const meta  = consts[card.constellation] || {};
    const color = meta.color || '#6c8ef5';
    const conn  = connections[card.id] || {};

    // ── Render identity card ──────────────────────────────────────────
    const isMe = card.id === myId;

    document.getElementById('loading').remove();
    const main = document.getElementById('main-content');

    // Color the whole page subtly
    document.documentElement.style.setProperty('--c-color', color);

    const neighborCards  = (conn.tableNeighbors  || []).map(id => byId[id]).filter(Boolean);
    const dirPairCards   = (conn.directionPairs  || []).map(id => byId[id]).filter(Boolean);

    main.innerHTML = `
      <!-- Hero identity -->
      <div class="node-hero section">
        <div class="node-constellation-badge" style="color:${color};border-color:${color}40">
          ${card.symbol || card.constellation} · ${meta.fullName || card.constellation}
        </div>
        <div class="node-name">${card.name}</div>
        <div class="node-title">${card.title || ''}</div>
        <div class="node-attrs">
          <div class="node-attr">
            <span class="node-attr-label">Node</span>
            <span class="node-attr-value" style="color:${color}">${String(card.number).padStart(2,'0')}</span>
          </div>
          <div class="node-attr">
            <span class="node-attr-label">Bearing</span>
            <span class="node-attr-value" style="color:${color}">${card.direction}</span>
          </div>
          <div class="node-attr">
            <span class="node-attr-label">Table</span>
            <span class="node-attr-value" style="color:${color};font-size:14px">${(card.table||'').replace('-',' ')}</span>
          </div>
        </div>
        ${card.leader ? `<div class="polaris-badge"><span class="polaris-pulse"></span> TABLE ANCHOR</div>` : ''}
      </div>

      <!-- CSV profile -->
      ${card.oneWord ? `
      <div class="info-row">
        <div class="info-cell">
          <div class="info-cell-label">Approach</div>
          <div class="info-cell-value">${card.oneWord}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Role</div>
          <div class="info-cell-value">${card.role || '—'}</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-cell">
          <div class="info-cell-label">Energy</div>
          <div class="info-cell-value" style="font-size:12px">${card.attitude || '—'}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Project style</div>
          <div class="info-cell-value" style="font-size:12px">${card.projectStyle || '—'}</div>
        </div>
      </div>
      ${card.favoriteWork ? `
      <div class="section" style="margin-bottom:8px">
        <div class="section-label">Best work this year</div>
        <div class="section-body">${card.favoriteWork}</div>
      </div>` : ''}
      ` : ''}

      <!-- Connections -->
      <div class="section" style="margin-bottom:8px">
        <div class="section-label">Table neighbors — tap their card</div>
        <div class="connections-grid">
          ${neighborCards.map(c => `
            <button class="conn-chip is-neighbor" onclick="openCompare('${c.id}')">
              <span class="chip-dot"></span>${c.name}${c.leader?' ◉':''}
            </button>`).join('')}
        </div>
      </div>

      <div class="section" style="margin-bottom:8px">
        <div class="section-label">Opposite bearing — your polar axis</div>
        <div class="connections-grid">
          ${dirPairCards.slice(0,8).map(c => `
            <button class="conn-chip ${c.leader?'is-polaris':''}" onclick="openCompare('${c.id}')">
              <span class="chip-dot"></span>${c.name} · ${c.symbol||c.constellation}
            </button>`).join('')}
          ${dirPairCards.length > 8 ? `<span class="conn-chip" style="cursor:default;opacity:0.6">+${dirPairCards.length-8} more</span>` : ''}
        </div>
      </div>

      <!-- Tap prompt -->
      <div class="tap-prompt">
        <div class="tap-prompt-icon">◈</div>
        <div class="tap-prompt-text">
          <strong>Tap any other card</strong> to unlock the interaction between you.<br>
          Start with your table neighbors above.
        </div>
      </div>
    `;

    // ── Register with backend (lights up map) ─────────────────────────
    try {
      const cfg = window.MIDNIGHT_ECLIPSE_CONFIG || {};
      const socket = io(cfg.BACKEND_URL || undefined, { transports: ['websocket','polling'] });
      socket.on('connect', () => {
        socket.emit('guest_join', { cardId: card.id, name: card.name });
      });
    } catch(e) {}

    // ── Comparison popup ──────────────────────────────────────────────
    const overlay = document.getElementById('compare-overlay');
    const body    = document.getElementById('compare-body');

    window.openCompare = async function(otherId) {
      const other = byId[otherId];
      if (!other) return;

      const myCard = byId[myId] || card;
      const result = MidnightRules.evaluate(myCard, other, connections);

      const otherMeta  = consts[other.constellation] || {};
      const otherColor = otherMeta.color || '#6c8ef5';

      const polarisNote = (myCard.leader || other.leader)
        ? `${myCard.leader && other.leader
            ? `${myCard.name} and ${other.name} are both table anchors. A rare dual-anchor contact.`
            : `${(myCard.leader ? myCard : other).name} is a table anchor — this interaction is amplified.`}`
        : null;

      body.innerHTML = `
        <div class="compare-header">
          <div class="compare-strength-badge ${result.strength}">${result.headline}</div>
          <div class="compare-headline">${myCard.name} × ${other.name}</div>
          <div class="compare-names">${myCard.symbol||myCard.constellation} · Node ${myCard.number} meets ${other.symbol||other.constellation} · Node ${other.number}</div>
        </div>

        ${polarisNote ? `<div class="compare-polaris-note visible">◉ ${polarisNote}</div>` : ''}

        <div class="compare-person">
          <div class="compare-person-name">${other.name}${other.leader?' <span style="color:var(--gold)">◉</span>':''}</div>
          <span class="compare-person-tag">${other.symbol||other.constellation} · ${(otherMeta.fullName||other.constellation)}</span>
          <div class="compare-person-stats">
            ${other.oneWord  ? `<div class="cps"><div class="cps-label">Approach</div><div class="cps-val">${other.oneWord}</div></div>` : ''}
            ${other.role     ? `<div class="cps"><div class="cps-label">Role</div><div class="cps-val">${other.role}</div></div>` : ''}
            ${other.attitude ? `<div class="cps"><div class="cps-label">Energy</div><div class="cps-val" style="font-size:12px">${other.attitude}</div></div>` : ''}
          </div>
          ${other.favoriteWork ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">Best work: <span style="color:var(--text)">${other.favoriteWork}</span></div>` : ''}
          ${other.plusOneOf ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px">+1 of ${other.plusOneOf}</div>` : ''}
        </div>

        ${result.rules.length ? `
        <div class="section-label" style="margin-bottom:8px">Interaction signals</div>
        <div class="rule-list">
          ${result.rules.map(r => `
            <div class="rule-item">
              <span class="rule-dot ${r.strength}"></span>
              <div>
                <div class="rule-label">${r.label}</div>
                <div class="rule-text">${r.text}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}

        ${result.isDirectNeighbor ? `
        <div class="section" style="background:rgba(108,142,245,0.06);border-color:var(--border-bright);margin-bottom:14px">
          <div style="font-size:13px;color:var(--accent)">◈ You are seated directly next to ${other.name} tonight.</div>
        </div>` : ''}

        <button class="compare-close" onclick="closeCompare()">Close</button>
      `;

      overlay.classList.add('visible');
      document.body.style.overflow = 'hidden';
    };

    window.closeCompare = function() {
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
    };

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeCompare();
    });

    // If this page was loaded via a SECOND tap (comparison mode), auto-open popup
    const scanParam = url.searchParams.get('scan');
    if (scanParam && byId[scanParam] && scanParam !== targetId) {
      setTimeout(() => openCompare(scanParam), 400);
    }
  })();
  </script>
</body>
</html>
